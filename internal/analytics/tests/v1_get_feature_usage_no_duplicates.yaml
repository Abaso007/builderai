- name: deduplicates_usage
  description: Verifies that usage records with same idempotency_key are deduplicated
  parameters: project_id=p1&customer_id=c1&feature_slugs=f1&start=1767225500000&end=1767225900000
  expected_result: |
    {"project_id":"p1","customer_id":"c1","feature_slug":"f1","latest":10}

- name: keeps_latest_value_per_idempotency_key
  description: Verifies latest version wins when the same idempotency key is updated
  parameters: project_id=p1&customer_id=c1&feature_slugs=f4&start=1767225500000&end=1767225900000
  expected_result: |
    {"project_id":"p1","customer_id":"c1","feature_slug":"f4","latest":3}
