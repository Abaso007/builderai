- name: returns_latest_usage_for_period_key
  description: Verifies latest value_after is returned per feature for a given period_key
  parameters: project_id=p1&customer_id=c1&period_key=period_usage
  expected_result: |
    {"project_id":"p1","customer_id":"c1","feature_slug":"f_usage","value":4}

- name: scopes_usage_by_period_key
  description: Verifies rows from other period keys are excluded
  parameters: project_id=p1&customer_id=c1&period_key=period_usage_prev
  expected_result: |
    {"project_id":"p1","customer_id":"c1","feature_slug":"f_usage","value":99}
