app = "unprice-lakehouse-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "dev"
  CATALOG = "unprice-lakehouse-dev"
  CATALOG_NAMESPACE = "lakehouse"
  LAKEHOUSE_BUCKET_NAME = "unprice-lakehouse-dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
